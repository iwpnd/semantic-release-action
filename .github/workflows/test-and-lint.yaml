name: test-and-lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write
  checks: write

jobs:
  build-lint-test:
    env:
      CI: true
      HUSKY: 0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: enable Corepack
        run: corepack enable

      - name: yarn cache
        id: yarn-cache
        run: echo "dir=./yarn/cache" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: install
        run: yarn install --immutable

      - name: lint
        run: yarn lint

      - name: test
        run: yarn test

      - name: build
        run: yarn build

  test-release:
    name: test-release
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: release
        id: release
        uses: ./
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/commit-analyzer
            @semantic-release/github
            @semantic-release/release-notes-generator
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: test output
        id: test-output
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          echo ${{ steps.semantic.outputs.new_release_version }}
          echo ${{ steps.semantic.outputs.new_release_major_version }}
          echo ${{ steps.semantic.outputs.new_release_minor_version }}
          echo ${{ steps.semantic.outputs.new_release_patch_version }}

  tag-and-release:
    runs-on: ubuntu-latest
    needs: [build-lint-test, test-release]
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: tag and release
        id: tag-and-release
        uses: ./
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # this will maintain @v1 tag with the latest minor and patch updates
      # so consumers of the any of our actions can use the generic @v1 tag
      # as oppossed to update with every patch.
      - name: update major version tag
        if: steps.tag-and-release.outputs.new_release_published == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const majorVersion = '${{ steps.tag-and-release.outputs.new_release_major_version }}';
            const tagName = `v${majorVersion}`;
            const sha = '${{ steps.tag-and-release.outputs.new_release_git_head }}';

            try {
              // Try to update existing ref
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
                sha: sha,
                force: true
              });
              console.log(`Updated tag ${tagName} to ${sha}`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                // Tag doesn't exist, create it
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${tagName}`,
                  sha: sha
                });
                console.log(`Created tag ${tagName} at ${sha}`);
              } else {
                throw error;
              }
            }
